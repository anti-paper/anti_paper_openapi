openapi: "3.0.0"
info:
  title: 情報管理システム
  version: 1.0.0
servers:
  - url: "http://localhost:8002"
tags:
  - name: sample
    description: サンプルだにょん
  - name: schedule
    description: スケジュール管理
paths:
  /sample/{id}:
    get:
      description: サンプル説明
      tags:
        - sample
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        201:
          description: 正常系
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sample"
        default:
          description: 異常系
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Other"
  /schedule/create:
    post:
      description: スケジュールを新規に登録する
      tags:
        - schedule
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestSchedule"
      responses:
        200:
          description: 正常系
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseCreatedSchedule"
        422:
          description: 異常系（バリデーションエラー）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnprocessableEntityAboutName"
        500:
          description: 異常系（予期せぬエラー）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalServerError"
components:
  schemas:
    Sample:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int32
          example: 100
        name:
          type: string
          example: anti-paper
        status:
          type: string
          description: 状態
          enum:
            - 有効
            - 非有効
    RequestSchedule:
      type: object
      required:
        - name
        - content
        - frequency
        - start_date
      properties:
        name:
          type: string
          example: schedule3
        content:
          type: string
          example: description3
        frequency:
          type: integer
          format: int32
          description: "0:日次 1:週次 2:月次 3:年次"
          enum:
            - 0
            - 1
            - 2
            - 3
        start_date:
          type: string
          example: 2024-01-01
        end_date:
          type: string
          example: 2026-12-31
    ResponseCreatedSchedule:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: "スケジュールの作成に成功しました。"
    Other:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "Not found."
    NotFound:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: コンテンツがありません。
    UnprocessableEntityAboutName:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "'name'は必須項目です。"
    UnprocessableEntityAboutIsDone:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "'is_done'は必須項目です。"
    UnprocessableEntityAboutTrashDay:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "'trash_day'は必須項目です。"
    InternalServerError:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: 予期せぬエラーが発生しました。
